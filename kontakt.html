<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kontakt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="leistungen.html">Leistungen</a>
    <a href="ueber-mich.html">Über mich</a>
    <a href="kontakt.html">Kontakt</a>
  </nav>

  <main>
    <div class="karte">
      <h1>Kontakt</h1>
      <p class="untertitel">Schreib mir kurz, was du brauchst — ich melde mich zeitnah zurück.</p>
      <form id="kontakt-formular">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Dein Name">

        <label for="email">E-Mail</label>
        <input type="text" id="email" placeholder="deine@email.de">

        <label for="nachricht">Nachricht</label>
        <textarea id="nachricht" placeholder="Deine Nachricht"></textarea>

        <button type="submit">Absenden</button>
        <p id="fehler-text"></p>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
